---
name: compliance diff
on:
  pull_request:
    branches: [main]
jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download baseline from latest main run
        id: baseline
        continue-on-error: true # first PR before any main run has no artifact yet
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: compliance-main.yml
          branch: main
          name: compliance-baseline
          path: .
          rename_to: base_cache.json

      - name: Sparse-clone llvm-project (libcxx/test only)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/llvm/llvm-project.git llvm-project
          git -C llvm-project sparse-checkout set libcxx/test

      - name: Re-run baseline tests with PR headers
        if: steps.baseline.outcome == 'success'
        env:
          LLVM_ROOT: ${{ github.workspace }}/llvm-project
        run: |
          # Seed with the baseline corpus so we test the same files, then
          # recheck them all with the PR's psychicstd headers.
          cp base_cache.json .compliance_cache.json
          python3 tools/compliance.py --recheck

      - name: Run fresh compliance (no baseline to compare against)
        if: steps.baseline.outcome != 'success'
        env:
          LLVM_ROOT: ${{ github.workspace }}/llvm-project
        run: python3 tools/compliance.py

      - name: Generate diff table
        if: steps.baseline.outcome == 'success'
        run: |
          python3 tools/compliance_diff.py \
            --base base_cache.json \
            --head .compliance_cache.json \
            > diff.md
          cat diff.md

      - name: Post compliance diff as PR comment
        if: steps.baseline.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: diff.md
