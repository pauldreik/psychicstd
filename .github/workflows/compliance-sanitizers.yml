---
name: compliance sanitizers
on:
  push:
    branches: [main]
  schedule:
    - cron: 0 3 * * 1
  workflow_dispatch:
jobs:
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Markdown formatter
        run: pipx install mdformat
      - name: Sparse-clone llvm-project (libcxx/test only)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/llvm/llvm-project.git llvm-project
          git -C llvm-project sparse-checkout set libcxx/test
      - name: Run libcxx suite under ASan/UBSan
        env:
          LLVM_ROOT: ${{ github.workspace }}/llvm-project
        run: python3 tools/compliance.py --sanitize
      - name: Rename cache
        if: always()
        run: mv .compliance_cache.sanitize.json sanitize_base_cache.json
      - name: Upload sanitizer cache as baseline artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sanitize-baseline
          path: sanitize_base_cache.json
          retention-days: 90
