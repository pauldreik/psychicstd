---
name: real-world project builds
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  rdfind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Enable deb-src
        run: |
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
          sudo apt-get update
      - name: Install Markdown formatter
        run: pipx install mdformat
      - name: Install rdfind build dependencies
        run: sudo apt-get build-dep -y rdfind
      - name: Build and benchmark rdfind with psychicstd
        run: >-
          python3 scripts/compare_realworld_performance.py --project rdfind
          --build-type both --reps 3
          --output use_on_realworld_projects/rdfind_speed_report.md
      - name: Upload speed report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rdfind-speed-report
          path: use_on_realworld_projects/rdfind_speed_report.md
      # TODO: no project here is built with sanitizers yet. rdfind used to
      # have a "run with sanitizers" step, but it silently ignored its own
      # -a/-u flags and just rebuilt the same non-sanitized binary again.
  simdutf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Markdown formatter
        run: pipx install mdformat
      - name: Install ninja
        run: sudo apt-get install -y ninja-build
      - name: Build and test simdutf with psychicstd
        run: >-
          python3 scripts/compare_realworld_performance.py --project simdutf
          --build-type debug --reps 1
          --output use_on_realworld_projects/simdutf_speed_report.md
      - name: Upload speed report
        if: always()
