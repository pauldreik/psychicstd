---
name: real-world project builds
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  rdfind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Enable deb-src
        run: |
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
          sudo apt-get update
      - name: Install Markdown formatter
        run: pipx install mdformat
      - name: Install rdfind build dependencies
        run: sudo apt-get build-dep -y rdfind
      - name: Benchmark rdfind (system STL vs psychicstd)
        run: bash use_on_realworld_projects/benchmark_rdfind.sh
      - name: Upload speed report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rdfind-speed-report
          path: use_on_realworld_projects/rdfind_speed_report.md
      - name: run rdfind with sanitizers
        run: |
          export UBSAN_OPTIONS="print_stacktrace=1:halt_on_error=1"
          bash use_on_realworld_projects/benchmark_rdfind.sh -a -u
  nlohmann:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build nlohmann JSON examples with psychicstd
        run: bash use_on_realworld_projects/test_nlohmann.sh
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and test fmt with psychicstd
        run: bash use_on_realworld_projects/test_fmt.sh
  catch2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and test Catch2 with psychicstd
        run: bash use_on_realworld_projects/test_catch2.sh
      - name: Upload speed report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: catch2-speed-report
          path: use_on_realworld_projects/catch2_speed_report.md
  eigen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and benchmark Eigen tests with psychicstd
        run: bash use_on_realworld_projects/test_eigen.sh
      - name: Upload speed report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eigen-speed-report
          path: use_on_realworld_projects/eigen_speed_report.md
  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and benchmark cppcheck with psychicstd
        run: bash use_on_realworld_projects/test_cppcheck.sh
      - name: Upload speed report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cppcheck-speed-report
          path: use_on_realworld_projects/cppcheck_speed_report.md
