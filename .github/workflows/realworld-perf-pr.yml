---
name: realworld performance diff
on:
  pull_request:
    branches: [main]
permissions:
  pull-requests: write
jobs:
  compare:
    name: ${{ matrix.project }} performance diff
    strategy:
      fail-fast: false
      matrix:
        project:
          - catch2
          - cppcheck
          - eigen
          - fmt
#          - nlohmann  # too slow to run on a MR
          - rdfind
          - simdutf
    # Main and PR are measured in one job on one runner so absolute runner
    # speed cancels out. Only the psychicstd include directory changes.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need origin/main for the comparison worktree
      - name: Enable rdfind source packages
        if: matrix.project == 'rdfind'
        run: |
          sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
          sudo apt-get update
      - name: Install rdfind build dependencies
        if: matrix.project == 'rdfind'
        run: sudo apt-get build-dep -y rdfind
      - name: Compare build time (PR vs main)
        run: >-
          python3 scripts/compare_realworld.py ${{ matrix.project }}
          --time-budget 10m --max-reps 10
          | tee diff.md
      - name: Post realworld perf diff as PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: realworld-${{ matrix.project }}
          path: diff.md
